name: Release monorepo packages
on:
  workflow_dispatch:

env:
  CPU_CORES: 2
  HUSKY: 0

jobs:
  # Step 0: run the full CI suite before anything mutates the repo or
  # registry. Gating release-prepare on this means a failing lint /
  # test / build short-circuits the release with no version bump, no
  # tag, no GitHub release, and no artifacts to roll back. Without
  # this gate, nothing else in release-prepare runs lint or tests —
  # see issue #23.
  ci:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/ci.yml

  # Step 1: bump version, tag, create GitHub release, push to main.
  # No artifacts shipped yet — that happens in publish-docker and
  # release-publish below. lerna creates a non-prerelease GitHub
  # release on a stable cut, so GitHub auto-promotes it to Latest
  # without an explicit `gh release edit --latest`.
  release-prepare:
    name: Prepare release (version bump)
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      sha: ${{ steps.version.outputs.sha }}
    # GITHUB_TOKEN needs no permissions: the version-bump push and
    # the GitHub release both go through the App token minted below.
    permissions: {}

    steps:
      # Mint an App token so the version-bump push and the GitHub
      # release are made by the arazzo-builder App, which is on the
      # `Protect main` ruleset's bypass list. GITHUB_TOKEN is a
      # separate identity that the ruleset would reject — the post-
      # bump SHA has no status check runs against it yet, and
      # `strict_required_status_checks_policy: true` demands them.
      # The lerna commit message carries `[skip ci]` (lerna.json),
      # so the push does not retrigger docker-publish.yml.
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ARAZZO_BUILDER_APP_ID }}
          private-key: ${{ secrets.ARAZZO_BUILDER_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
      - name: Install monorepo dependencies
        run: npm ci --engine-strict=false --ignore-scripts
      # Guard against a race between `workflow_dispatch` queue time
      # and the lerna step: if another commit lands on main while the
      # runner is starting up or installing deps, `lerna version` sees
      # the local checkout behind upstream and bails with a non-fatal
      # `EBEHIND` warning (exit 0). Downstream `publish-docker` then
      # rebuilds GHCR at the existing tag with post-graduation bytes,
      # violating tag-immutability. We `git fetch` so we see the same
      # upstream state lerna will, then fail fast — placed immediately
      # before lerna so the gap is milliseconds. See issue #119.
      - name: Fail if main moved during workflow startup
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::main moved $BEHIND commit(s) during workflow startup. Re-run release.yml."
            exit 1
          fi
      - name: Version bump & GitHub release
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          npx lerna version --conventional-commits --no-private --yes --force-publish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Extract released version and bump SHA
        id: version
        run: |
          {
            echo "value=$(node -p 'require("./lerna.json").version')"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

  # Step 2: build and push the multi-arch GHCR image at the
  # exact tag the CLI will resolve to. Runs BEFORE npm publish so
  # the matching image is on GHCR by the time the npm tarball
  # becomes resolvable. If this fails, no npm publish happens —
  # consumers never see a CLI version they can install but not run.
  publish-docker:
    needs: [release-prepare]
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release-prepare.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  # Step 3: publish to npm and attest the registry-served tarball.
  # Runs only after the image is live, so `npx @jentic/...@<v>` is
  # never resolvable before `docker run ghcr.io/...:<v>` is.
  release-publish:
    name: Publish to npm
    needs: [release-prepare, publish-docker]
    runs-on: ubuntu-latest
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@jentic/api-scorecard-cli
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      # Pin to the bump SHA produced by release-prepare so this job
      # publishes deterministically against the post-bump tree, not
      # whatever main looks like at the time it runs.
      - name: Checkout bump commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-prepare.outputs.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
          registry-url: https://registry.npmjs.org
      - name: Install monorepo dependencies
        run: npm ci --engine-strict=false --ignore-scripts
      - name: Build monorepo
        run: npm run build
      - name: Publish monorepo npm packages
        run: npx lerna publish from-package --no-private --yes
      # We attest the registry-served tarball, not a locally-repacked one.
      # `lerna publish` injects a `gitHead` field into package.json before
      # its internal pack, so the bytes the registry serves can't be
      # reproduced by `npm pack -w` against unmutated source. Pulling the
      # published tarball back guarantees the attestation digest matches
      # what consumers actually download.
      #
      # We curl the tarball URL directly instead of `npm pack <pkg>@<ver>`
      # because npm's package-metadata CDN (the JSON document at /<pkg>)
      # propagates separately and slowly. The tarball CDN at
      # /<pkg>/-/<pkg>-<ver>.tgz is *usually* available within ~1s of
      # publish (alpha.10: tarball last-modified 12:12:26, publish ACK
      # 12:12:25), but propagation can stall for 10+ minutes when npm's
      # anti-abuse path is engaged — observed on alpha.12 where the
      # tarball blob 404'd for >10 min after a successful `lerna publish`
      # while the metadata document had already propagated. Budget the
      # retry loop for the worst case so a healthy publish is never
      # short-circuited by a slow CDN write.
      - name: Download published CLI tarball from registry
        uses: nick-fields/retry@v4
        with:
          max_attempts: 60
          retry_wait_seconds: 30
          timeout_minutes: 35
          retry_on: error
          command: |
            mkdir -p ./artifacts
            curl --fail --silent --show-error --location \
              --header "Cache-Control: no-cache" \
              --header "Pragma: no-cache" \
              --output "./artifacts/jentic-api-scorecard-cli-${VERSION}.tgz" \
              "https://registry.npmjs.org/@jentic/api-scorecard-cli/-/api-scorecard-cli-${VERSION}.tgz"
        env:
          VERSION: ${{ needs.release-prepare.outputs.version }}
      # The CLI now depends on its workspace sibling
      # @jentic/api-scorecard-formatter-html, published moments earlier in this
      # same job. The SBOM's `npm install` resolves that sibling from the
      # registry, whose metadata can lag the publish ACK (same propagation window
      # as the tarball download above) and surface as `ETARGET notarget`. Retry
      # until the just-published version has propagated.
      - name: Generate SPDX SBOM for CLI
        uses: nick-fields/retry@v4
        with:
          max_attempts: 60
          retry_wait_seconds: 30
          timeout_minutes: 35
          retry_on: error
          command: |
            mkdir -p ./artifacts/sbom-staging
            jq 'del(.devDependencies)' packages/cli/package.json \
              > ./artifacts/sbom-staging/package.json
            (cd ./artifacts/sbom-staging \
              && npm install --omit=dev --no-audit --no-fund --ignore-scripts \
              && npm sbom --sbom-format=spdx --sbom-type=application --omit=dev \
                > ../cli.sbom.spdx.json)
            jq empty ./artifacts/cli.sbom.spdx.json
      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: ./artifacts/jentic-api-scorecard-cli-${{ needs.release-prepare.outputs.version }}.tgz
          sbom-path: ./artifacts/cli.sbom.spdx.json

  # Step 4: graduate the floating major tag (e.g. `v1`) to the freshly
  # cut release, so consumers who pin `jentic/jentic-api-scorecard@v1`
  # in their workflows (the README examples do) auto-receive every
  # patch/minor without a doc edit. lerna already created the immutable
  # `vX.Y.Z` tag; we force-move the major alias onto it.
  #
  # This runs LAST — only after both the GHCR image (publish-docker) and
  # the npm tarball (release-publish) are live. The major tag must never
  # advance past a half-shipped release: were it moved in release-prepare,
  # a later docker/npm failure would leave `@v1` pointing at a version
  # consumers can resolve but not run. Gating on both upstream jobs makes
  # the alias graduate only once the release is fully usable.
  update-major-tag:
    name: Update floating major tag
    needs: [release-prepare, publish-docker, release-publish]
    runs-on: ubuntu-latest
    # contents:write to push the tag goes through the App token below,
    # which is on the `Protect main` ruleset bypass list; GITHUB_TOKEN
    # needs nothing.
    permissions: {}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ARAZZO_BUILDER_APP_ID }}
          private-key: ${{ secrets.ARAZZO_BUILDER_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-prepare.outputs.sha }}
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Move major tag to the released version
        env:
          VERSION: ${{ needs.release-prepare.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          MAJOR="v${VERSION%%.*}"
          git tag -f "$MAJOR" "v${VERSION}"
          git push origin "refs/tags/$MAJOR" --force
