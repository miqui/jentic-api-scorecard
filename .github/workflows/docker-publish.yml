name: Publish Docker Image

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      version:
        description: Semver tag without v prefix (e.g. 1.0.0-alpha.1)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Semver tag without v prefix (e.g. 1.0.0-alpha.1). Leave blank to publish unstable.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    if: ${{ !inputs.version }}
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    if: ${{ !cancelled() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE_NAME: ghcr.io/jentic/jentic-api-scorecard
      IMAGE_TAG: ${{ inputs.version || 'unstable' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # For versioned releases, `sbom: true` and `provenance: mode=max`
      # attach in-toto SBOM and SLSA provenance to the OCI manifest as
      # referrer artifacts (verified via `docker buildx imagetools inspect`).
      # The post-push attestation steps below also publish Sigstore-signed
      # equivalents to GitHub's attestation store (verified via
      # `gh attestation verify`). Both stores are populated so consumers
      # can use either verification flow.
      #
      # `:unstable` rolls on every green push to main, so attesting specific
      # bytes to a tag whose content changes without notice produces
      # signatures that don't compose. Skip both BuildKit and post-push
      # attestations for unstable builds — see issue #42.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # Annotate the multi-arch manifest index. Dockerfile LABELs only
          # land on per-platform image configs, so GHCR's package UI (which
          # reads from the index) shows "No description" without these.
          annotations: |
            index:org.opencontainers.image.authors=vladimir@jentic.com
            index:org.opencontainers.image.url=https://github.com/jentic/jentic-api-scorecard
            index:org.opencontainers.image.source=https://github.com/jentic/jentic-api-scorecard
            index:org.opencontainers.image.description=Jentic API Scorecard Docker image
            index:org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: ${{ inputs.version != '' }}
          provenance: ${{ inputs.version != '' && 'mode=max' || 'false' }}

      # Smoke test runs immediately after push so a Sigstore/Fulcio/Rekor
      # outage downstream cannot mask a broken image. amd64 only (runner
      # native); arm64 coverage falls under the per-platform attestation
      # loop and CI's image-build smoke.
      - name: Smoke test Docker image
        run: docker run --rm ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} score --help

      # Per-platform SBOMs and attestations only run for versioned releases.
      # The `:unstable` tag rolls on every green push to main, so attesting
      # specific bytes there produces signatures that don't compose — the
      # tag's content changes without notice. Versioned tags (`:1.0.0-alpha.<n>`)
      # are immutable and worth signing.
      #
      # Per-platform SBOMs: scanning the manifest-list digest with syft on
      # an amd64 runner only ever produces an amd64 SBOM. Loop the child
      # manifest digests out of build-push-action's metadata and generate +
      # attest one SBOM per platform so consumers verifying against either
      # platform digest get an SBOM that matches the bytes they pulled.
      # build-push-action's metadata exposes only the index digest, not the
      # per-platform child manifests. Fetch the index from the registry and
      # extract amd64/arm64 manifest digests with jq. `imagetools inspect
      # --raw` prints the manifest JSON to stdout without pulling layers.
      - name: Resolve per-platform digests
        id: platforms
        if: inputs.version != ''
        run: |
          set -euo pipefail
          index_ref="${IMAGE_NAME}@${INDEX_DIGEST}"
          index_json=$(docker buildx imagetools inspect "$index_ref" --raw)
          amd64_digest=$(echo "$index_json" | jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest' | head -n1)
          arm64_digest=$(echo "$index_json" | jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64") | .digest' | head -n1)
          if [ -z "$amd64_digest" ] || [ -z "$arm64_digest" ]; then
            echo "::error::Failed to resolve per-platform digests from index manifest"
            echo "$index_json"
            exit 1
          fi
          echo "amd64=$amd64_digest" >> "$GITHUB_OUTPUT"
          echo "arm64=$arm64_digest" >> "$GITHUB_OUTPUT"
        env:
          INDEX_DIGEST: ${{ steps.build.outputs.digest }}

      - name: Generate SPDX SBOM (amd64)
        if: inputs.version != ''
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.platforms.outputs.amd64 }}
          format: spdx-json
          output-file: ./image.sbom.amd64.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM (arm64)
        if: inputs.version != ''
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.platforms.outputs.arm64 }}
          format: spdx-json
          output-file: ./image.sbom.arm64.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance (index)
        if: inputs.version != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM (amd64)
        if: inputs.version != ''
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.platforms.outputs.amd64 }}
          sbom-path: ./image.sbom.amd64.spdx.json
          push-to-registry: true

      - name: Attest SBOM (arm64)
        if: inputs.version != ''
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.platforms.outputs.arm64 }}
          sbom-path: ./image.sbom.arm64.spdx.json
          push-to-registry: true

      # `:unstable` rolls on every green push to main, so the previous index
      # loses its tag and (if its bytes differ) its per-platform children
      # become orphan. Walk every current real tag's manifest list, build a
      # keep-set of reachable digests, and delete anything else. Best-effort:
      # the script always exits 0 so a transient packages-API hiccup never
      # fails the publish job — survivors are cleaned up on the next push.
      - name: Prune orphan GHCR versions
        if: inputs.version == ''
        run: bash .github/scripts/docker-prune-unstable-orphans.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: jentic
          PACKAGE: jentic-api-scorecard
          IMAGE_REPO: jentic/jentic-api-scorecard
