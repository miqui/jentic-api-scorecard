name: Publish docs to jentic-docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/publish-config.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to jentic-docs
        env:
          GH_TOKEN: ${{ secrets.JENTIC_GITHUB_TOKEN }}
        run: bash scripts/publish-to-docs.sh ${{ github.sha }} ${{ secrets.JENTIC_GITHUB_TOKEN }}

      - name: Summary
        if: success()
        run: |
          echo "✅ Docs published successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the created PR in the [jentic-docs](https://github.com/jentic/jentic-docs) repository." >> $GITHUB_STEP_SUMMARY
