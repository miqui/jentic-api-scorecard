name: Publish docs to jentic-docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/publish-config.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.10.0

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.JENTIC_DOCS_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.JENTIC_DOCS_PUBLISHER_PRIVATE_KEY }}
          repositories: jentic-docs

      - name: Publish to jentic-docs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash scripts/publish-to-docs.sh ${{ github.sha }}

      - name: Summary
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ✅ Docs published successfully

          Check the created PR in the [jentic-docs](https://github.com/jentic/jentic-docs) repository.
          EOF
